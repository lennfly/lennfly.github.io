<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
  />
  <title>Ademhaling</title>
  <style>
    :root {
      --bg-1: #f6f1e7;
      --bg-2: #edf3ea;
      --bg-3: #dde8dc;
      --card: rgba(247, 244, 237, 0.92);
      --border: #d7e2d4;
      --border-soft: #dde5da;
      --text: #314338;
      --text-soft: #738277;
      --text-muted: #8b998d;
      --accent: #6f8c72;
      --accent-dark: #617c65;
      --accent-light: #eef3ea;
      --button-text: #f7f5ef;
      --ring: #d8e3d7;
      --progress-bg: #dde7db;
      --orb-rgb: 126, 162, 134;
      --shadow: 0 20px 50px rgba(91, 112, 98, 0.08);
      --shadow-strong: 0 25px 60px rgba(91, 112, 98, 0.10);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      min-height: 100%;
      height: -webkit-fill-available;
      background:
        radial-gradient(circle at top, var(--bg-1) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
      touch-action: manipulation;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      min-height: -webkit-fill-available;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, var(--bg-1) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
      background-attachment: fixed;
      -webkit-overflow-scrolling: touch;
      touch-action: manipulation;
    }

    .page {
      min-height: 100vh;
      min-height: 100svh;
      padding: calc(40px + env(safe-area-inset-top)) 24px calc(40px + env(safe-area-inset-bottom)) 24px;
      background:
        radial-gradient(circle at top, var(--bg-1) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
    }

    .container {
      max-width: 1152px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 32px;
      align-items: start;
    }

    .settings-column {
      display: block;
    }

    .settings-card {
      border: 1px solid var(--border);
      border-radius: 34px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      padding: 24px;
    }

    .mobile-menu-toggle {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fbfaf7;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 6px 18px rgba(91,112,98,0.05);
      width: 100%;
      min-width: 0;
      appearance: none;
      cursor: pointer;
      touch-action: manipulation;
    }

    .mobile-menu-toggle svg {
      transition: transform 0.2s ease;
      color: #708274;
      flex: 0 0 auto;
    }

    .mobile-menu-toggle.open svg {
      transform: rotate(180deg);
    }

    .mobile-settings-panel {
      display: none;
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      padding: 16px;
    }

    .mobile-settings-panel.open {
      display: block;
    }

    .desktop-settings {
      display: block;
    }

    .phase-list {
      display: grid;
      gap: 16px;
    }

    .phase-card {
      position: relative;
      border: 1px solid var(--border-soft);
      border-radius: 24px;
      padding: 16px;
      background: #fbfaf7;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease, opacity 0.18s ease;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .phase-card.drag-over,
    .phase-card.touch-drop-target {
      border-color: #a8baaa;
      background: #edf3ea;
      box-shadow: 0 8px 20px rgba(91,112,98,0.08);
    }

    .phase-card.touch-source-hidden {
      opacity: 0.35;
    }

    .phase-head {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .grip-box {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      background: var(--accent-light);
      color: #708274;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 10px rgba(91,112,98,0.06);
      cursor: grab;
      flex: 0 0 auto;
      touch-action: none;
    }

    .grip-box:active {
      cursor: grabbing;
    }

    .phase-meta {
      flex: 1;
      min-width: 0;
    }

    .phase-step {
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .phase-label {
      margin-top: 4px;
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .duration-box {
      margin-top: 32px;
      border: 1px solid var(--border-soft);
      border-radius: 24px;
      background: #fbfaf7;
      padding: 16px;
    }

    .section-label {
      margin-bottom: 12px;
      font-size: 14px;
      font-weight: 500;
      color: #5f7062;
    }

    .duration-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .chip,
    .stop-btn,
    .duration-btn,
    .start-btn {
      appearance: none;
      border: 0;
      outline: none;
      cursor: pointer;
      font: inherit;
      transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      touch-action: manipulation;
    }

    .chip {
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      border: 1px solid var(--border-soft);
      background: #f3f2ec;
      color: #5c6d5f;
    }

    .chip.active {
      background: var(--accent);
      color: var(--button-text);
      box-shadow: 0 4px 14px rgba(111,140,114,0.18);
      border-color: transparent;
    }

    .duration-btn {
      border-radius: 18px;
      padding: 14px 16px;
      background: var(--accent-light);
      color: #55665a;
      font-size: 14px;
    }

    .duration-btn.active {
      background: var(--accent);
      color: var(--button-text);
      box-shadow: 0 4px 14px rgba(111,140,114,0.18);
    }

    .right-card {
      border: 1px solid var(--border);
      border-radius: 38px;
      background: linear-gradient(180deg, rgba(250,247,240,0.96) 0%, rgba(238,244,235,0.96) 100%);
      box-shadow: var(--shadow-strong);
      backdrop-filter: blur(8px);
      padding: 24px;
    }

    .status-row {
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      font-size: 14px;
      color: var(--text-soft);
    }

    .status-row .current {
      font-weight: 500;
      color: #4f6154;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: var(--accent-light);
      padding: 8px 12px;
      font-weight: 500;
      color: #5f7062;
    }

    .orb-stage {
      min-height: 560px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb-wrap {
      position: relative;
      width: 430px;
      height: 430px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 10px solid var(--ring);
      background: radial-gradient(circle at center, rgba(255,255,255,0.85) 0%, rgba(241,246,237,0.35) 70%, transparent 100%);
      box-shadow: 0 0 40px rgba(150,170,152,0.16);
    }

    .orb-inner {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at center,
        rgba(var(--orb-rgb), 0.82) 0%,
        rgba(var(--orb-rgb), 0.55) 45%,
        rgba(var(--orb-rgb), 0.25) 75%,
        transparent 100%);
      filter: blur(8px);
      box-shadow: 0 0 90px rgba(var(--orb-rgb), 0.24);
      transform: scale(0.5);
      transition-property: transform;
      transition-timing-function: linear;
      pointer-events: none;
    }

    .orb-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
      padding: 20px;
    }

    .start-btn {
      width: 96px;
      height: 96px;
      border-radius: 999px;
      background: var(--accent);
      color: var(--button-text);
      box-shadow: 0 12px 30px rgba(111,140,114,0.28);
      font-size: 16px;
      font-weight: 500;
    }

    .start-btn:hover { background: var(--accent-dark); }

    .phase-name {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: rgba(247,245,239,0.88);
      font-weight: 500;
      max-width: 180px;
      line-height: 1.4;
    }

    .stop-btn {
      padding: 12px 22px;
      border-radius: 999px;
      border: 1px solid rgba(247,245,239,0.45);
      background: rgba(247,245,239,0.10);
      color: var(--button-text);
      backdrop-filter: blur(6px);
      font-size: 15px;
      font-weight: 500;
    }

    .stop-btn:hover { background: rgba(247,245,239,0.16); }

    .progress {
      margin-top: 24px;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--progress-bg);
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #7ea286 0%, #67856f 100%);
      transition: width 0.22s linear;
    }

    .footer-row {
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      font-size: 14px;
      color: var(--text-soft);
    }

    .footer-row strong {
      color: #4f6154;
      font-weight: 500;
    }

    .touch-ghost {
      position: fixed;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
    }

    .touch-ghost.active {
      opacity: 1;
    }

    .touch-ghost-card {
      width: min(320px, calc(100vw - 32px));
      border: 1px solid #a8baaa;
      border-radius: 24px;
      padding: 16px;
      background: rgba(251, 250, 247, 0.96);
      box-shadow: 0 18px 38px rgba(91,112,98,0.18);
      backdrop-filter: blur(8px);
      transform: translate(-50%, -50%) scale(1.02);
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .orb-wrap {
        width: min(78vw, 430px);
        height: min(78vw, 430px);
      }

      .orb-stage {
        min-height: 440px;
      }
    }

    @media (max-width: 640px) {
      html,
      body,
      .page {
        width: 100%;
        overflow-x: hidden;
      }

      html,
      body {
        background:
          radial-gradient(circle at top, var(--bg-1) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
      }

      .page {
        padding: calc(20px + env(safe-area-inset-top)) 14px calc(20px + env(safe-area-inset-bottom) + 16px) 14px;
      }

      .grid {
        gap: 16px;
      }

      .settings-column {
        display: block;
      }

      .desktop-settings {
        display: none;
      }

      .mobile-menu-toggle {
        display: inline-flex;
      }

      .mobile-settings-panel {
        display: none;
      }

      .mobile-settings-panel.open {
        display: block;
      }

      .right-card {
        padding: 18px;
      }

      .duration-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="container">
      <div class="grid">
        <div class="settings-column">
          <button class="mobile-menu-toggle" id="mobileMenuToggle" type="button" aria-expanded="false">
            <span id="mobileMenuLabel">Instellingen</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
          </button>

          <div class="mobile-settings-panel" id="mobileSettingsPanel">
            <div id="phaseListMobile" class="phase-list"></div>

            <div class="duration-box">
              <div id="durationLabelMobile" class="section-label">Duur</div>
              <div class="duration-grid" id="durationGridMobile"></div>
            </div>
          </div>

          <div class="settings-card desktop-settings" id="desktopSettings">
            <div id="phaseListDesktop" class="phase-list"></div>

            <div class="duration-box">
              <div id="durationLabelDesktop" class="section-label">Duur</div>
              <div class="duration-grid" id="durationGridDesktop"></div>
            </div>
          </div>
        </div>

        <div class="right-card">
          <div class="status-row">
            <span class="current" id="currentPhaseText">Klaar</span>
            <span class="status-pill" id="sessionTopText">5 min sessie</span>
          </div>

          <div class="orb-stage">
            <div class="orb-wrap">
              <div class="orb-ring"></div>
              <div class="orb-inner" id="orbInner"></div>
              <div class="orb-content" id="orbContent"></div>
            </div>
          </div>

          <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
          </div>

          <div class="footer-row">
            <span><span id="cycleLabel">Cyclus</span>: <strong id="cycleValue">15s</strong></span>
            <span id="footerDuration">5 min</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="touch-ghost" id="touchGhost"></div>

  <script>
    const TEXT = {
      inhale: "Inademen",
      exhale: "Uitademen",
      hold: "Vasthouden",
      step: "Stap",
      duration: "Duur",
      minutes: "min",
      start: "Start",
      stop: "Stop",
      ready: "Klaar",
      session: "sessie",
      cycle: "Cyclus",
      menu: "Instellingen"
    };

    const SECOND_OPTIONS = [4, 5, 6, 7, 8];
    const DURATION_OPTIONS = [5, 10];
    const TOUCH_HOLD_MS = 180;

    const state = {
      phases: createDefaultPhases(),
      durationMinutes: 5,
      draggedId: null,
      dragOverId: null,
      isRunning: false,
      currentPhaseIndex: 0,
      phaseRemaining: 0,
      sessionRemaining: 0,
      timerId: null,
      phaseEndAt: 0,
      sessionEndAt: 0,
      audioContext: null,
      mobileMenuOpen: false,
      touch: {
        sourceId: null,
        dropId: null,
        holdTimer: null,
        active: false,
        started: false,
        startX: 0,
        startY: 0,
        x: 0,
        y: 0,
      }
    };

    const els = {
      phaseListDesktop: document.getElementById("phaseListDesktop"),
      phaseListMobile: document.getElementById("phaseListMobile"),
      durationLabelDesktop: document.getElementById("durationLabelDesktop"),
      durationLabelMobile: document.getElementById("durationLabelMobile"),
      durationGridDesktop: document.getElementById("durationGridDesktop"),
      durationGridMobile: document.getElementById("durationGridMobile"),
      currentPhaseText: document.getElementById("currentPhaseText"),
      sessionTopText: document.getElementById("sessionTopText"),
      orbInner: document.getElementById("orbInner"),
      orbContent: document.getElementById("orbContent"),
      progressBar: document.getElementById("progressBar"),
      cycleLabel: document.getElementById("cycleLabel"),
      cycleValue: document.getElementById("cycleValue"),
      footerDuration: document.getElementById("footerDuration"),
      mobileMenuToggle: document.getElementById("mobileMenuToggle"),
      mobileMenuLabel: document.getElementById("mobileMenuLabel"),
      mobileSettingsPanel: document.getElementById("mobileSettingsPanel"),
      touchGhost: document.getElementById("touchGhost"),
    };

    function createDefaultPhases() {
      return [
        { id: "inhale", type: "inhale", label: TEXT.inhale, seconds: 5 },
        { id: "exhale", type: "exhale", label: TEXT.exhale, seconds: 5 },
        { id: "hold", type: "hold", label: TEXT.hold, seconds: 5 },
      ];
    }

    function formatTime(sec) {
      const safe = Math.max(0, sec);
      const m = Math.floor(safe / 60);
      const s = safe % 60;
      return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }

    function reorder(list, startId, targetId) {
      const next = [...list];
      const fromIndex = next.findIndex((item) => item.id === startId);
      const toIndex = next.findIndex((item) => item.id === targetId);
      if (fromIndex === -1 || toIndex === -1 || fromIndex === toIndex) return next;
      const [moved] = next.splice(fromIndex, 1);
      next.splice(toIndex, 0, moved);
      return next;
    }

    function getTotalCycleSeconds() {
      return state.phases.reduce((sum, phase) => sum + phase.seconds, 0);
    }

    function getSessionSeconds() {
      return state.durationMinutes * 60;
    }

    function getCurrentPhase() {
      return state.phases[state.currentPhaseIndex] || null;
    }

    function getSessionProgress() {
      const sessionSeconds = getSessionSeconds();
      if (sessionSeconds <= 0) return 0;
      return ((sessionSeconds - state.sessionRemaining) / sessionSeconds) * 100;
    }

    function isMobileView() {
      return window.innerWidth <= 640;
    }

    function syncMobileMenu() {
      if (!isMobileView()) {
        els.mobileSettingsPanel.classList.remove("open");
        els.mobileMenuToggle.classList.remove("open");
        els.mobileMenuToggle.setAttribute("aria-expanded", "false");
        return;
      }

      els.mobileSettingsPanel.classList.toggle("open", state.mobileMenuOpen);
      els.mobileMenuToggle.classList.toggle("open", state.mobileMenuOpen);
      els.mobileMenuToggle.setAttribute("aria-expanded", String(state.mobileMenuOpen));
    }

    function setOrbScale(scale, seconds) {
      els.orbInner.style.transitionDuration = `${seconds}s`;
      els.orbInner.style.transitionTimingFunction = "linear";
      els.orbInner.style.transform = `scale(${scale})`;
    }

    function setVisualForPhase(phase) {
      if (!phase) return;
      if (phase.type === "inhale") setOrbScale(1, phase.seconds);
      if (phase.type === "exhale") setOrbScale(0.5, phase.seconds);
    }

    function ensureAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return null;
      if (!state.audioContext) state.audioContext = new AudioContextClass();
      if (state.audioContext.state === "suspended") state.audioContext.resume();
      return state.audioContext;
    }

    function playTone(type) {
      const ctx = ensureAudioContext();
      if (!ctx) return;

      const now = ctx.currentTime;
      const master = ctx.createGain();
      const oscA = ctx.createOscillator();
      const oscB = ctx.createOscillator();
      const filter = ctx.createBiquadFilter();

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(700, now);
      filter.Q.setValueAtTime(0.15, now);

      master.gain.setValueAtTime(0.0001, now);
      master.gain.exponentialRampToValueAtTime(0.015, now + 0.45);
      master.gain.exponentialRampToValueAtTime(0.01, now + 1.4);
      master.gain.exponentialRampToValueAtTime(0.0001, now + 2.8);

      if (type === "inhale") {
        oscA.type = "sine";
        oscB.type = "triangle";
        oscA.frequency.setValueAtTime(220, now);
        oscA.frequency.exponentialRampToValueAtTime(270, now + 1.8);
        oscB.frequency.setValueAtTime(110, now);
        oscB.frequency.exponentialRampToValueAtTime(135, now + 1.8);
      } else if (type === "exhale") {
        oscA.type = "sine";
        oscB.type = "triangle";
        oscA.frequency.setValueAtTime(240, now);
        oscA.frequency.exponentialRampToValueAtTime(170, now + 1.9);
        oscB.frequency.setValueAtTime(120, now);
        oscB.frequency.exponentialRampToValueAtTime(85, now + 1.9);
      } else {
        oscA.type = "sine";
        oscB.type = "sine";
        oscA.frequency.setValueAtTime(185, now);
        oscA.frequency.linearRampToValueAtTime(195, now + 1.4);
        oscB.frequency.setValueAtTime(92, now);
        oscB.frequency.linearRampToValueAtTime(97, now + 1.4);
      }

      oscA.connect(filter);
      oscB.connect(filter);
      filter.connect(master);
      master.connect(ctx.destination);
      oscA.start(now);
      oscB.start(now);
      oscA.stop(now + 2.9);
      oscB.stop(now + 2.9);
    }

    function stopSession() {
      if (state.timerId) {
        clearInterval(state.timerId);
        state.timerId = null;
      }
      state.isRunning = false;
      state.currentPhaseIndex = 0;
      state.phaseRemaining = 0;
      state.sessionRemaining = 0;
      setOrbScale(0.5, 0);
      render();
    }

    function goToPhase(index) {
      const phase = state.phases[index];
      if (!phase) return;

      state.currentPhaseIndex = index;
      state.phaseRemaining = phase.seconds;
      state.phaseEndAt = Date.now() + phase.seconds * 1000;

      if (phase.type !== "hold") {
        requestAnimationFrame(() => setVisualForPhase(phase));
      }

      playTone(phase.type);
      render();
    }

    function startSession() {
      if (state.timerId) {
        clearInterval(state.timerId);
        state.timerId = null;
      }

      state.isRunning = true;
      state.sessionRemaining = getSessionSeconds();
      state.sessionEndAt = Date.now() + getSessionSeconds() * 1000;

      const first = state.phases[0];
      if (first?.type === "inhale") setOrbScale(0.5, 0);
      if (first?.type === "exhale") setOrbScale(1, 0);
      if (first?.type === "hold") setOrbScale(0.5, 0);

      state.currentPhaseIndex = 0;
      goToPhase(0);
      state.timerId = window.setInterval(tickSession, 200);
    }

    function tickSession() {
      if (!state.isRunning) return;

      const now = Date.now();
      const sessionLeft = Math.max(0, Math.ceil((state.sessionEndAt - now) / 1000));
      const phaseLeft = Math.max(0, Math.ceil((state.phaseEndAt - now) / 1000));

      state.sessionRemaining = sessionLeft;
      state.phaseRemaining = phaseLeft;

      if (sessionLeft <= 0) {
        stopSession();
        return;
      }

      if (phaseLeft <= 0) {
        const nextIndex = (state.currentPhaseIndex + 1) % state.phases.length;
        goToPhase(nextIndex);
        return;
      }

      render();
    }

    function clearTouchHoldTimer() {
      if (state.touch.holdTimer) {
        clearTimeout(state.touch.holdTimer);
        state.touch.holdTimer = null;
      }
    }

    function resetTouchState() {
      clearTouchHoldTimer();
      state.touch.sourceId = null;
      state.touch.dropId = null;
      state.touch.active = false;
      state.touch.started = false;
      state.touch.startX = 0;
      state.touch.startY = 0;
      state.touch.x = 0;
      state.touch.y = 0;
      hideTouchGhost();
    }

    function createGhostMarkup(phase, index) {
      return `
        <div class="touch-ghost-card">
          <div class="phase-head">
            <div class="grip-box">
              <span aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                  <circle cx="9" cy="5" r="1.2"/>
                  <circle cx="9" cy="12" r="1.2"/>
                  <circle cx="9" cy="19" r="1.2"/>
                  <circle cx="15" cy="5" r="1.2"/>
                  <circle cx="15" cy="12" r="1.2"/>
                  <circle cx="15" cy="19" r="1.2"/>
                </svg>
              </span>
            </div>
            <div class="phase-meta">
              <div class="phase-step">${TEXT.step} ${index + 1}</div>
              <div class="phase-label">${phase.label}</div>
            </div>
          </div>
          <div class="chips">
            ${SECOND_OPTIONS.map((sec) => `<span class="chip${phase.seconds === sec ? " active" : ""}">${sec}s</span>`).join("")}
          </div>
        </div>
      `;
    }

    function showTouchGhost(phaseId) {
      const phase = state.phases.find((p) => p.id === phaseId);
      const index = state.phases.findIndex((p) => p.id === phaseId);
      if (!phase || index === -1) return;
      els.touchGhost.innerHTML = createGhostMarkup(phase, index);
      els.touchGhost.classList.add("active");
      updateTouchGhostPosition(state.touch.x, state.touch.y);
    }

    function updateTouchGhostPosition(x, y) {
      els.touchGhost.style.left = `${x}px`;
      els.touchGhost.style.top = `${y}px`;
    }

    function hideTouchGhost() {
      els.touchGhost.classList.remove("active");
      els.touchGhost.innerHTML = "";
      els.touchGhost.style.left = "0px";
      els.touchGhost.style.top = "0px";
    }

    function getTouchPhaseCard(clientX, clientY) {
      const el = document.elementFromPoint(clientX, clientY);
      if (!el) return null;
      return el.closest(".phase-card");
    }

    function startTouchDrag(phaseId) {
      state.touch.active = true;
      state.touch.sourceId = phaseId;
      state.touch.dropId = phaseId;
      showTouchGhost(phaseId);
      render();
    }

    function handleTouchStart(phaseId, event) {
      if (state.isRunning) return;

      const touch = event.touches[0];
      if (!touch) return;

      resetTouchState();
      state.touch.started = true;
      state.touch.sourceId = phaseId;
      state.touch.dropId = phaseId;
      state.touch.startX = touch.clientX;
      state.touch.startY = touch.clientY;
      state.touch.x = touch.clientX;
      state.touch.y = touch.clientY;

      state.touch.holdTimer = setTimeout(() => {
        if (!state.touch.started || state.touch.sourceId !== phaseId) return;
        startTouchDrag(phaseId);
      }, TOUCH_HOLD_MS);
    }

    function handleTouchMove(event) {
      if (!state.touch.started && !state.touch.active) return;

      const touch = event.touches[0];
      if (!touch) return;

      state.touch.x = touch.clientX;
      state.touch.y = touch.clientY;

      const deltaX = Math.abs(touch.clientX - state.touch.startX);
      const deltaY = Math.abs(touch.clientY - state.touch.startY);

      if (!state.touch.active) {
        if (deltaX > 10 || deltaY > 10) {
          clearTouchHoldTimer();
        }
        return;
      }

      event.preventDefault();
      updateTouchGhostPosition(touch.clientX, touch.clientY);

      const targetCard = getTouchPhaseCard(touch.clientX, touch.clientY);
      const nextDropId = targetCard ? targetCard.dataset.phaseId : null;

      if (nextDropId !== state.touch.dropId) {
        state.touch.dropId = nextDropId;
        render();
      }
    }

    function handleTouchEnd() {
      clearTouchHoldTimer();

      if (state.touch.active && state.touch.sourceId && state.touch.dropId && state.touch.sourceId !== state.touch.dropId) {
        state.phases = reorder(state.phases, state.touch.sourceId, state.touch.dropId);
      }

      resetTouchState();
      render();
    }

    function createPhaseCard(phase, index) {
      const phaseCard = document.createElement("div");
      const isDropTarget = state.dragOverId === phase.id || (state.touch.active && state.touch.dropId === phase.id && state.touch.sourceId !== phase.id);
      const isTouchSource = state.touch.active && state.touch.sourceId === phase.id;

      phaseCard.className = `phase-card${isDropTarget ? " touch-drop-target" : ""}${isTouchSource ? " touch-source-hidden" : ""}`;
      phaseCard.draggable = !state.isRunning && !isMobileView();
      phaseCard.dataset.phaseId = phase.id;

      phaseCard.addEventListener("dragstart", () => {
        if (state.isRunning) return;
        state.draggedId = phase.id;
      });

      phaseCard.addEventListener("dragover", (e) => {
        if (state.isRunning) return;
        e.preventDefault();
        state.dragOverId = phase.id;
        phaseCard.classList.add("drag-over");
      });

      phaseCard.addEventListener("dragleave", () => {
        phaseCard.classList.remove("drag-over");
      });

      phaseCard.addEventListener("drop", (e) => {
        e.preventDefault();
        if (!state.draggedId || state.draggedId === phase.id || state.isRunning) return;
        state.phases = reorder(state.phases, state.draggedId, phase.id);
        state.draggedId = null;
        state.dragOverId = null;
        render();
      });

      phaseCard.addEventListener("dragend", () => {
        state.draggedId = null;
        state.dragOverId = null;
        render();
      });

      const head = document.createElement("div");
      head.className = "phase-head";

      const grip = document.createElement("div");
      grip.className = "grip-box";
      grip.innerHTML = '<span aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="9" cy="5" r="1.2"/><circle cx="9" cy="12" r="1.2"/><circle cx="9" cy="19" r="1.2"/><circle cx="15" cy="5" r="1.2"/><circle cx="15" cy="12" r="1.2"/><circle cx="15" cy="19" r="1.2"/></svg></span>';

      grip.addEventListener("touchstart", (event) => handleTouchStart(phase.id, event), { passive: true });
      grip.addEventListener("touchmove", handleTouchMove, { passive: false });
      grip.addEventListener("touchend", handleTouchEnd);
      grip.addEventListener("touchcancel", handleTouchEnd);

      const meta = document.createElement("div");
      meta.className = "phase-meta";
      meta.innerHTML = `
        <div class="phase-step">${TEXT.step} ${index + 1}</div>
        <div class="phase-label">${phase.label}</div>
      `;

      head.appendChild(grip);
      head.appendChild(meta);
      phaseCard.appendChild(head);

      const chips = document.createElement("div");
      chips.className = "chips";

      SECOND_OPTIONS.forEach((sec) => {
        const chip = document.createElement("button");
        chip.className = `chip${phase.seconds === sec ? " active" : ""}`;
        chip.textContent = `${sec}s`;
        chip.disabled = state.isRunning || state.touch.active;
        chip.addEventListener("click", () => {
          phase.seconds = sec;
          render();
        });
        chips.appendChild(chip);
      });

      phaseCard.appendChild(chips);
      return phaseCard;
    }

    function renderPhaseLists() {
      els.phaseListDesktop.innerHTML = "";
      els.phaseListMobile.innerHTML = "";

      state.phases.forEach((phase, index) => {
        els.phaseListDesktop.appendChild(createPhaseCard(phase, index));
        els.phaseListMobile.appendChild(createPhaseCard(phase, index));
      });
    }

    function renderDurationButtons() {
      els.durationGridDesktop.innerHTML = "";
      els.durationGridMobile.innerHTML = "";
      els.durationLabelDesktop.textContent = TEXT.duration;
      els.durationLabelMobile.textContent = TEXT.duration;

      DURATION_OPTIONS.forEach((option) => {
        const createBtn = () => {
          const btn = document.createElement("button");
          btn.className = `duration-btn${state.durationMinutes === option ? " active" : ""}`;
          btn.textContent = `${option} ${TEXT.minutes}`;
          btn.disabled = state.isRunning || state.touch.active;
          btn.addEventListener("click", () => {
            state.durationMinutes = option;
            render();
          });
          return btn;
        };

        els.durationGridDesktop.appendChild(createBtn());
        els.durationGridMobile.appendChild(createBtn());
      });
    }

    function renderOrbContent() {
      const currentPhase = getCurrentPhase();
      els.orbContent.innerHTML = "";

      if (!state.isRunning) {
        const btn = document.createElement("button");
        btn.className = "start-btn";
        btn.type = "button";
        btn.textContent = TEXT.start;
        btn.addEventListener("click", startSession);
        els.orbContent.appendChild(btn);
        return;
      }

      const phaseName = document.createElement("div");
      phaseName.className = "phase-name";
      phaseName.textContent = currentPhase ? currentPhase.label : TEXT.ready;

      const stopBtn = document.createElement("button");
      stopBtn.className = "stop-btn";
      stopBtn.type = "button";
      stopBtn.textContent = TEXT.stop;
      stopBtn.addEventListener("click", stopSession);

      els.orbContent.appendChild(phaseName);
      els.orbContent.appendChild(stopBtn);
    }

    function renderStaticTexts() {
      els.cycleLabel.textContent = TEXT.cycle;
      els.mobileMenuLabel.textContent = TEXT.menu;
      document.documentElement.lang = "nl";
      document.title = "Ademhaling";
      syncMobileMenu();
    }

    function render() {
      const currentPhase = getCurrentPhase();
      renderStaticTexts();
      renderPhaseLists();
      renderDurationButtons();
      renderOrbContent();
      els.currentPhaseText.textContent = currentPhase ? currentPhase.label : TEXT.ready;
      els.sessionTopText.textContent = state.isRunning ? formatTime(state.sessionRemaining) : `${state.durationMinutes} ${TEXT.minutes} ${TEXT.session}`;
      els.progressBar.style.width = `${Math.max(0, Math.min(100, getSessionProgress()))}%`;
      els.cycleValue.textContent = `${getTotalCycleSeconds()}s`;
      els.footerDuration.textContent = `${state.durationMinutes} ${TEXT.minutes}`;
    }

    els.mobileMenuToggle.addEventListener("click", () => {
      state.mobileMenuOpen = !state.mobileMenuOpen;
      syncMobileMenu();
    });

    window.addEventListener("resize", () => {
      if (!isMobileView()) {
        state.mobileMenuOpen = false;
      }
      syncMobileMenu();
      render();
    });

    document.addEventListener("touchmove", (event) => {
      if (state.touch.active) {
        event.preventDefault();
      }
    }, { passive: false });

    document.addEventListener("touchend", () => {
      if (state.touch.started || state.touch.active) {
        handleTouchEnd();
      }
    });

    document.addEventListener("touchcancel", () => {
      if (state.touch.started || state.touch.active) {
        handleTouchEnd();
      }
    });

    setOrbScale(0.5, 0);
    syncMobileMenu();
    render();
  </script>
</body>
</html>
